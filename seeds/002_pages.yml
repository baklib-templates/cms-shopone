pages:
  name: "Shop Support Hub"
  slug: "index"
  template_name: "index"
  settings:
    description: "Welcome to the Shop product support and learning center."
    hero_image_url: "images/demo/hero.jpg"
    text_color: "#ffffff"
  children:
    - name: "Products"
      slug: "products"
      template_name: "products"
      settings:
        title: "Product catalog"
        description: "Browse smart beauty devices and professional makeup tools with specs, guides, and downloads."
      children:
        - name: "LumiGlow Smart Light Therapy Device"
          slug: "lumiglow-device"
          template_name: "product"
          settings:
            title: "LumiGlow Smart Light Therapy Device"
            tags:
              - "Smart Beauty Devices"
            description: "Three-spectrum skin care with AI skin-type detection and personalized routines."
            thumb_image_url: "images/demo/product1.png"
            hero_image_url: "images/demo/product1_banner.png"
            external_url: "https://example.com/shop/lumiglow"
            content: |
              <h2>Highlights</h2>
              <ul>
                <li><strong>AI skin scan</strong> — analyzes oil, moisture, and sensitivity.</li>
                <li><strong>Three light modes</strong> — blue purify, yellow brighten, red repair.</li>
                <li><strong>360° hood</strong> — keeps temperature and humidity stable during sessions.</li>
              </ul>
              <p>Pair with the Shop app to log sessions and view weekly skin reports.</p>
          children:
            - name: "FAQs"
              slug: "faqs"
              template_name: "faqs"
              settings:
                title: "FAQs"
                description: "Answers about smart beauty devices and professional makeup tools."
              children:
                - name: "Device guides"
                  slug: "device-guide"
                  template_name: "faqs"
                  settings:
                    title: "Smart device guides"
                    description: "From unboxing to daily care workflows."
                  children:
                    - name: "First-time LumiGlow activation"
                      slug: "lumiglow-activation"
                      template_name: "post"
                      settings:
                        title: "What are the steps to activate LumiGlow for the first time?"
                        content: |
                          <p>Install the Shop app, charge the device, complete the face scan, then start with the recommended 8-minute program.</p>
                          <p>Increase spectrum intensity gradually after you observe how your skin responds.</p>
                    - name: "HydraMist water types"
                      slug: "hydramist-water-guide"
                      template_name: "post"
                      settings:
                        title: "What water can I use with HydraMist?"
                        content: |
                          <p>Use purified or mineral water only. Do not add oils, perfume, or thick serums in the tank.</p>
                          <p>Apply serums with DermaWave first, then finish with a cold mist to soothe skin.</p>
                - name: "Service & warranty"
                  slug: "service-support"
                  template_name: "faqs"
                  settings:
                    title: "Service and warranty"
                    description: "Support channels, extended warranty, and bookings."
                  children:
                    - name: "Device warranty policy"
                      slug: "device-warranty"
                      template_name: "post"
                      settings:
                        title: "Smart device warranty policy"
                        content: |
                          <p>LumiGlow, HydraMist, and DermaWave include 12 months of coverage. Register as a Shop member to extend to 18 months with annual calibration.</p>
                    - name: "Book a makeup consultant"
                      slug: "book-makeup-consultant"
                      template_name: "post"
                      settings:
                        title: "How do I book a Shop makeup consultant?"
                        content: |
                          <p>Use <strong>Contact Us</strong> at the bottom of the site, choose makeup consultant service, and submit your details. A consultant confirms within 24 hours.</p>
            - name: "Downloads"
              slug: "downloads"
              template_name: "downloads"
              settings:
                title: "Downloads"
                description: "Product launches, partnerships, and channel updates from Shop."
              children:
                - name: "Spring 2025 skin-care launch"
                  slug: "spring-beauty-2025"
                  template_name: "post"
                  settings:
                    title: "Spring 2025 launch: LumiGlow series goes global"
                    description: "LumiGlow and HydraMist debut with AI skin scanning at the spring launch event."
                    content: |
                      <p>Shop unveiled the LumiGlow light therapy device and HydraMist steamer with live AI skin scanning and spectrum demos.</p>
                      <p>The <strong>Skin Journey</strong> lab in the app shows care data and upgrade suggestions after each session.</p>
                - name: "FlowBeauty ecosystem partnership"
                  slug: "flowbeauty-partnership"
                  template_name: "post"
                  settings:
                    title: "Shop partners with FlowBeauty on smart beauty ecosystem"
                    description: "Joint membership, device leasing, and pro artist training across the ecosystem."
                    content: |
                      <p>The teams will co-develop hardware, tools, and cloud data services, including a joint membership and service network.</p>
                      <p>Plans cover device leasing, on-site maintenance, and pro artist training.</p>
            - name: "Videos"
              slug: "videos"
              template_name: "videos"
              settings:
                title: "Video tutorials"
                description: "Official guides for devices and makeup tools."
                video_type: "0"
              children:
                - name: "LumiGlow unboxing and modes"
                  slug: "lumiglow-unboxing"
                  template_name: "video"
                  settings:
                    title: "LumiGlow unboxing and mode switching"
                    youtube_id: "6c3RXM7lK20"
                    description: "Activation, app pairing, skin scan, and three light programs."
                    content: |
                      <p>Covers first-time setup, care plan selection, and post-session cleaning for new owners.</p>
                - name: "SilkTouch brush care"
                  slug: "silktouch-care"
                  template_name: "video"
                  settings:
                    title: "SilkTouch brush care guide"
                    youtube_id: "X9l9Qw5Hv2U"
                    description: "Daily cleaning, deep care, and travel storage tips."
                    content: |
                      <p>Demonstrates a 3-minute wash with SilkTouch cleaner and how to keep brushes dry on the go.</p>

